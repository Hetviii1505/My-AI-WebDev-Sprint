<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-DevOps Orchestrator | Hetvi Patel</title>
    <!-- Linking the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header: The top navigation bar -->
    <header class="main-header">
        <nav>
        <span class="logo">AI-DevOps <span class="accent">Orchestrator</span></span>
        
        <!-- Theme Switcher UI -->
        <div class="theme-switcher">
            <button class="t-btn" onclick="setTheme('midnight')" style="background: #0f172a;"></button>
            <button class="t-btn" onclick="setTheme('emerald')" style="background: #064e3b;"></button>
            <button class="t-btn" onclick="setTheme('cyberpunk')" style="background: #2d1b4e;"></button>
        </div>
    </nav>
</header>

        <!-- Main Content Area -->
        <main class="content-area">
            <div class="dashboard-controls">
                    <div class="filter-group">
                       <button class="ctrl-btn" onclick="filterFindings('All')">All</button>
                       <button class="ctrl-btn" onclick="filterFindings('High')">Critical</button>
                    </div>
                    <button class="clear-btn" onclick="clearHistory()">Clear Terminal</button>
            </div>
            <!-- Section for AI interaction and code reports -->
            <section id="chat-window">
                <div class="message system">
                    <p>System initialized. Ready for repository analysis.</p>
                </div>
                <div class="filter-controls">
                <span>Filter By:</span>
                    <button onclick="filterFindings('All')">All</button>
                    <button onclick="filterFindings('High')">High</button>
                </div>
            </section>

            <!-- Section for User Input at the bottom -->
            <section id="input-area">
                <input type="text" id="repo-link" placeholder="Enter GitHub Repository URL (e.g., https://github.com/...)">
                <button id="analyze-btn">Analyze Repo</button>
            </section>
        </main>
    </div>

    <!-- Linking the external JavaScript file (for Day 3) -->
    <script src="script.js"></script>
</body>
</html>
