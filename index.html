<!DOCTYPE html>
<html>
<head>
    <title>My First App</title>
    <style> 
    :root {
    --primary: #2563eb;
    --bg: #0f172a; /* Trendy Dark Mode */
    --text: #f8fafc;
}

body {
    margin: 0;
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100vh; /* Full screen height */
}

/* Flexbox Layout */
main {
    flex: 1; /* Takes up all available space */
    display: flex;
    flex-direction: column;
    padding: 20px;
}

#chat-window {
    flex: 1;
    overflow-y: auto; /* Makes only the chat scrollable */
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 20px;
}

/* Responsive Input Area */
#input-area {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #1e293b;
    color: white;
}

/* Media Query: For screens wider than 768px (Desktop) */
@media (min-width: 768px) {
    main {
        max-width: 800px;
        margin: 0 auto; /* Centers the app on desktop */
    }
}
</style>
</head>
<body>
    <!-- The Main Container -->
    <div class="app-container">
    <!-- 1. Header (Navigation) -->
     <header>
        <nav>AI-DevOps Orchestrator</nav>
     </header>

    <!-- 2. Main Content Area -->
    <main>
        <!-- Section for AI Output (Scrollable) -->
        <section id="chat-window">
            <p>Welcome, Hetvi. Ready to scan your repo?</p>
        </section>
    </main>

        <!-- Section for User Input (Fixed at bottom) -->
        <section id="input-area">
            <input type="text" placeholder="Paste GitHub URL here...">
            <button>Analyze</button>
        </section>
    </main> 
    </div>
</body>
</html>
